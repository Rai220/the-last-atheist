name: Generate Art Assets

on:
  workflow_dispatch:
    inputs:
      scene:
        description: 'Specific scene to generate (e.g. "prologue/phone_screen.jpg"), or "all" for all missing'
        required: false
        default: 'all'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-genai Pillow numpy

      - name: Generate missing scene assets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.scene }}" = "all" ]; then
            python3 generate_scenes_pillow.py
            python3 -c "
          import generate_art
          generate_art.generate_scenes()
          "
          else
            python3 -c "
          import generate_art
          from pathlib import Path
          scene = '${{ github.event.inputs.scene }}'
          if scene in generate_art.SCENES:
              generate_art.generate_with_imagen(generate_art.SCENES[scene], Path('assets/scenes') / scene)
          else:
              print(f'Scene {scene} not found in SCENES dict')
          "
          fi

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet assets/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit generated assets
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          git commit -m "Auto-generate art assets

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push
